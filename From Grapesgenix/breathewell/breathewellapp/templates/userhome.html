<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Water Quality Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css" rel="stylesheet">

  <style>
    body {
      font-family: Inter, system-ui;
      padding: 24px;
      margin: 0;
      color: #e2e8f0;
      background:
        linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.9)),
        url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2000");
      background-size: cover;
      background-attachment: fixed;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #fff;
    }

    .card {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(14px);
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: #94a3b8;
      text-align: left;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
    }

    .good {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
    }

    .moderate {
      background: rgba(251, 191, 36, 0.15);
      color: #fbbf24;
    }

    .poor {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
    }

    button {
      background: linear-gradient(135deg, #0ea5a0, #2563eb);
      color: white;
      border: none;
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
    }

    input {
      padding: 8px 10px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    #chartWrap {
      height: 360px;
    }


    .mode-selector {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .mode-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    .mode-option input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2563eb;
    }

    #collectBtn {
      margin-left: auto;
      background: linear-gradient(135deg, #10b981, #059669);
    }

    #collectBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      background: #555;
    }


    #aiFloatingBtn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 64px;
      height: 64px;
      background: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    /* DARK BACKDROP */

    #aiOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    /* LARGE CHAT WINDOW */

    #aiChatBox {
      width: 80%;
      max-width: 1100px;
      height: 80vh;
      background: #0f172a;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
    }

    /* HEADER */

    #aiHeader {
      background: #1e293b;
      padding: 14px 18px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
    }

    /* MESSAGE AREA */

    #aiMessages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 15px;
      line-height: 1.5;
    }

    /* MESSAGE STYLES */

    .aiMsgUser {
      text-align: right;
      margin-bottom: 14px;
    }

    .aiMsgBot {
      text-align: left;
      margin-bottom: 14px;
    }

    /* INPUT AREA */

    #aiInputArea {
      display: flex;
      gap: 8px;
      padding: 14px;
      background: #020617;
    }

    #aiInput {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    #aiSend {
      padding: 10px 16px;
    }



    .aiLoading {
      color: #94a3b8;
      font-style: italic;
      padding: 8px 0;
    }

    .aiSpinner {
      border: 3px solid #333;
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: inline-block;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0)
      }

      100% {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Water Quality Dashboard</h1>

    <!-- MODE CONTROL -->

    <div class="card mode-selector">

      <label class="mode-option">
        <input type="radio" name="mode" value="live" checked>
        <span>LIVE MODE</span>
      </label>

      <label class="mode-option">
        <input type="radio" name="mode" value="single">
        <span>SINGLE MODE</span>
      </label>

      <button id="collectBtn">COLLECT</button>

    </div>

    <!-- MANUAL DATA ENTRY -->

    <div class="card">

      <h3>Add Manual Reading</h3>

      <form id="readingForm">

        <input type="number" id="temperature" placeholder="Temperature °C" step="0.1" required>

        <input type="number" id="tds" placeholder="TDS ppm" required>

        <input type="number" id="turbidity" placeholder="Turbidity %" required>

        <button type="submit">Add Reading</button>

      </form>

      <div class="muted" style="margin-top:10px;font-size:14px">
        Equation Used:<code>RI = 100 × [0.45(Turb/100) + 0.45(1 - TDS/1000) + 0.10(1 - |Temp - 30|/10)]</code>
      </div>

      <div id="liveRI" style="margin-top:10px;font-weight:600"></div>

    </div>

    <!-- TABLE -->

    <div class="card">

      <h3>Latest Readings</h3>

      <table id="readingsTable">

        <thead>
          <tr>
            <th>ID</th>
            <th>Timestamp</th>
            <th>Temperature</th>
            <th>TDS</th>
            <th>Turbidity</th>
            <th>RI</th>
            <th>AI</th>
          </tr>
        </thead>

        <tbody></tbody>

      </table>

    </div>

    <!-- CHART -->

    <div class="card">

      <h3>Trend Chart</h3>

      <div id="chartWrap">
        <canvas id="trendChart"></canvas>
      </div>

    </div>

  </div>

  <div id="aiFloatingBtn">🤖</div>

  <div id="aiOverlay">

    <div id="aiChatBox">

      <div id="aiHeader">
        AI Water Quality Assistant
        <span id="aiClose" style="cursor:pointer">✕</span>
      </div>

      <div id="aiMessages"></div>

      <div id="aiInputArea">

        <input type="file" id="aiImage" accept="image/*">

        <input type="text" id="aiInput" placeholder="Ask about water quality...">

        <button id="aiSend">Send</button>

      </div>

    </div>

  </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>

    /* ---------- VARIABLES ---------- */

    let readings = []

    const tbody = document.querySelector("#readingsTable tbody")
    const liveRI = document.getElementById("liveRI")

    const TDS_MAX = 1000
    const TEMP_CENTER = 30
    const TEMP_RANGE = 10

    /* ---------- UTIL ---------- */

    function clamp01(x) {
      return Math.max(0, Math.min(1, x))
    }

    /* ---------- RI CALCULATION ---------- */

    function computeRI(temp, tds, turb) {

      let turbFactor = clamp01(turb / 100)
      let tdsFactor = clamp01(1 - (tds / TDS_MAX))
      let tempFactor = clamp01(1 - (Math.abs(temp - TEMP_CENTER) / TEMP_RANGE))

      let ri = 100 * (0.45 * turbFactor + 0.45 * tdsFactor + 0.10 * tempFactor)

      return Math.round(Math.max(0, Math.min(100, ri)) * 10) / 10

    }

    /* ---------- RI CATEGORY ---------- */

    function riCategory(ri) {

      if (ri >= 80) return ["Excellent", "good"]
      if (ri >= 60) return ["Good", "good"]
      if (ri >= 40) return ["Moderate", "moderate"]
      return ["Poor", "poor"]

    }

    /* ---------- TABLE ---------- */

    function renderTable() {

      tbody.innerHTML = ""

      readings.slice().reverse().forEach(r => {

        const [label, cls] = riCategory(r.ri)

        const tr = document.createElement("tr")

        tr.innerHTML = `
<td>${r.id ?? "-"}</td>
<td>${new Date(r.ts).toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        })}</td>
<td>${r.temp.toFixed(1)} °C</td>
<td>${r.tds} ppm</td>
<td>${r.turb}%</td>
<td><span class="badge ${cls}">${r.ri} — ${label}</span></td>
<td>
<button onclick='openAIChat(${JSON.stringify(r)})'>🤖</button>
</td>
`

        tbody.appendChild(tr)

      })

    }

    /* ---------- CHART ---------- */

    const ctx = document.getElementById("trendChart").getContext("2d")

    const chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "Turbidity %",
            data: [],
            borderColor: "#38bdf8",
            tension: 0.3
          },
          {
            label: "TDS ppm",
            data: [],
            borderColor: "#fbbf24",
            tension: 0.3
          },
          {
            label: "RI",
            data: [],
            borderColor: "#34d399",
            tension: 0.3
          }
        ]
      }
    })

    function updateChart() {

      chart.data.labels = readings.map(r => r.ts)

      chart.data.datasets[0].data = readings.map(r => r.turb)
      chart.data.datasets[1].data = readings.map(r => r.tds)
      chart.data.datasets[2].data = readings.map(r => r.ri)

      chart.update()

    }

    /* ---------- FETCH DATA ---------- */

    async function fetchReadings() {

      try {

        const response = await fetch("/api/latest-readings/")
        const data = await response.json()

        if (!data || data.length === 0) {

          readings = [
            { ts: "2025-09-01T09:00", temp: 26, tds: 350, turb: 90, ri: 82 },
            { ts: "2025-09-02T09:00", temp: 30, tds: 600, turb: 70, ri: 61 },
            { ts: "2025-09-03T09:00", temp: 22, tds: 200, turb: 95, ri: 91 },
            { ts: "2025-09-04T09:00", temp: 28, tds: 450, turb: 80, ri: 73 },
            { ts: "2025-09-05T09:00", temp: 27, tds: 320, turb: 85, ri: 84 }
          ]

        } else {

          readings = data

        }

        renderTable()
        updateChart()

      } catch (e) {

        console.log("API error")

      }

    }

    /* ---------- AUTO REFRESH ---------- */

    setInterval(fetchReadings, 3000)

    /* ---------- MODE RADIO ---------- */

    document.querySelectorAll('input[name="mode"]').forEach(radio => {

      radio.addEventListener("change", function () {

        fetch("/api/set-mode/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "mode=" + this.value
        })

      })

    })

    /* ---------- COLLECT ---------- */

    document.getElementById("collectBtn").onclick = () => {

      fetch("/api/collect-reading/", { method: "POST" })

    }

    /* ---------- MANUAL ENTRY ---------- */

    document.getElementById("readingForm").addEventListener("submit", async function (e) {

      e.preventDefault()

      const temp = parseFloat(document.getElementById("temperature").value)
      const tds = parseFloat(document.getElementById("tds").value)
      const turb = parseFloat(document.getElementById("turbidity").value)

      const ri = computeRI(temp, tds, turb)

      liveRI.innerHTML = "Preview RI: " + ri

      await fetch("/api/manual-reading/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `temperature=${temp}&tds=${tds}&turbidity=${turb}&ri=${ri}`
      })

      fetchReadings()

      this.reset()

    })




    const collectBtn = document.getElementById("collectBtn")

    document.querySelectorAll('input[name="mode"]').forEach(radio => {

      radio.addEventListener("change", function () {

        fetch("/api/set-mode/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "mode=" + this.value
        })

        if (this.value === "live") {
          collectBtn.disabled = true
        } else {
          collectBtn.disabled = false
        }

      })

    })


    /* ================= AI CHAT STATE ================= */

let aiMessages = [
{
role: "system",
content: "You are an AI assistant that analyzes water quality and suggests purification improvements. When a user provides you with water quality parameters (temperature, TDS, turbidity, RI), you respond with a brief analysis of the water quality and suggest improvements if needed. Always keep your responses concise and focused on the provided data. in this case, the turbidity is reversed , means higher value like 100% is clear and lower value like 0% is very turbid. RI ≥ 80 → Excellent,RI ≥ 60 → Good,RI ≥ 40 → Moderate,else → Poor. try to add emojis in your response to make it more engaging.and leave a space (newline) between analysis and suggestions."
}
]

let selectedRowData = null

const overlay = document.getElementById("aiOverlay")
const aiMessagesDiv = document.getElementById("aiMessages")
const aiInput = document.getElementById("aiInput")
const aiSendBtn = document.getElementById("aiSend")
const aiImageInput = document.getElementById("aiImage")


/* ================= OPEN CHAT FROM TABLE ROW ================= */

function openAIChat(row){

selectedRowData = row
overlay.style.display = "flex"

const prompt = `
Row ID: ${row.id}
Temperature: ${row.temp} °C
TDS: ${row.tds} ppm
Turbidity: ${row.turb} %
RI: ${row.ri}
Suggest purification improvements in a short way.`

addMessage(prompt,"user")

aiMessages.push({
role:"user",
content:prompt
})

sendAIMessage()

}


/* ================= FLOATING BUTTON ================= */

document.getElementById("aiFloatingBtn").onclick = () => {
overlay.style.display = "flex"
}


/* ================= CLOSE CHAT ================= */

document.getElementById("aiClose").onclick = () => {
overlay.style.display = "none"
}


/* ================= SEND BUTTON ================= */

aiSendBtn.onclick = sendAIMessage


/* ================= MAIN AI FUNCTION ================= */

async function sendAIMessage(){

const text = aiInput.value.trim()
const imageFile = aiImageInput.files[0]

/* If user typed something */

if(text !== ""){

addMessage(text,"user")

aiMessages.push({
role:"user",
content:text
})

aiInput.value = ""

}

/* Disable send button */

aiSendBtn.disabled = true

/* Loading animation */

const loading = document.createElement("div")
loading.className = "aiLoading"
loading.innerHTML = '<span class="aiSpinner"></span>AI thinking...'

aiMessagesDiv.appendChild(loading)
aiMessagesDiv.scrollTop = aiMessagesDiv.scrollHeight


try{

/* Prepare request */

const formData = new FormData()

formData.append("messages", JSON.stringify(aiMessages))

if(imageFile){
formData.append("image", imageFile)
}

/* Send to Django */

const response = await fetch("/api/ai-chat/",{
method:"POST",
body:formData
})

const data = await response.json()

loading.remove()

const reply = data.reply

/* Save AI reply */

aiMessages.push({
role:"assistant",
content:reply
})

addMessage(reply,"bot")

/* Clear image input */

aiImageInput.value = ""

}catch(error){

loading.innerText = "AI request failed."

}

/* Enable button again */

aiSendBtn.disabled = false

}


/* ================= MESSAGE RENDER ================= */

function addMessage(text,type){

const msg = document.createElement("div")

msg.className = type === "user" ? "aiMsgUser" : "aiMsgBot"

if(type === "bot"){
msg.innerHTML = marked.parse(text)
}else{
msg.innerText = text
}

aiMessagesDiv.appendChild(msg)

aiMessagesDiv.scrollTop = aiMessagesDiv.scrollHeight

}


    /* ---------- INIT ---------- */

    fetchReadings()
    collectBtn.disabled = true;
  </script>

</body>

</html>
