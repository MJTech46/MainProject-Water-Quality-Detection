{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Registration | Water Quality System</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap');

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('{% static "assets/img/health/background.jpg" %}') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .register-form {
      position: relative;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 30px 34px;
      border-radius: 18px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      width: 360px;
      max-width: 95%;
      z-index: 1;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from {opacity:0; transform: translateY(30px);}
      to {opacity:1; transform: translateY(0);}
    }

    .register-form h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #fff;
      font-weight: 600;
      font-size: 22px;
    }

    .register-form input {
      width: 100%;
      padding: 11px 12px;
      margin: 8px 0 14px 0;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.95);
      font-size: 14px;
      transition: 0.3s;
    }

    .register-form input:focus {
      outline: none;
      background: #fff;
      box-shadow: 0 0 8px rgba(52,152,219,0.6);
    }

    /* Modern Gender Toggle */
    .gender-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .gender-option {
      flex: 1;
      cursor: pointer;
    }

    .gender-option input {
      display: none;
    }

    .gender-option span {
      display: block;
      text-align: center;
      padding: 10px 0;
      border-radius: 8px;
      background: rgba(255,255,255,0.85);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .gender-option span:hover {
      background: #ffffff;
    }

    .gender-option input:checked + span {
      background: linear-gradient(135deg, #3498db, #2ecc71);
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      transform: scale(1.05);
    }

    .register-form button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3498db, #2ecc71);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .register-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    }

    .error-msg {
      font-size: 12px;
      color: #ff4d4d;
      display: none;
      margin-top: -6px;
      margin-bottom: 8px;
    }

    .form-footer {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: #ddd;
    }

    .form-footer a {
      color: #00c6ff;
      text-decoration: none;
      font-weight: 500;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="register-form">
  <h2>Create Your Account</h2>

  <form id="registrationForm" method="POST">
    {% csrf_token %}

    <input type="text" name="full_name" placeholder="Full Name" required>

    <input type="number" name="age" placeholder="Age" min="1" required>

    <!-- Improved Gender Toggle -->
    <div class="gender-group">
      <label class="gender-option">
        <input type="radio" name="gender" value="Male" required>
        <span>Male</span>
      </label>

      <label class="gender-option">
        <input type="radio" name="gender" value="Female" required>
        <span>Female</span>
      </label>
    </div>

    <input type="email" name="email" placeholder="Email Address" required>
    <span class="error-msg" id="emailError">Invalid email format.</span>

    <input type="text" name="phone" placeholder="Phone Number"
      pattern="\d{10}" maxlength="10" minlength="10"
      oninput="this.value=this.value.replace(/[^0-9]/g,'');"
      required>
    <span class="error-msg" id="phoneError">Phone number must be 10 digits.</span>

    <input type="password" name="password" placeholder="Password (min 6 characters)" minlength="6" required>
    <span class="error-msg" id="passwordError">Password must be at least 6 characters.</span>

    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
    <span class="error-msg" id="confirmPasswordError">Passwords do not match.</span>

    <button type="submit">Register</button>
  </form>

  <div class="form-footer">
    Already have an account? <a href="{% url 'login' %}">Sign in</a>
  </div>
</div>

<script>
  const form = document.getElementById('registrationForm');

  form.addEventListener('submit', function(e) {
    let valid = true;

    const email = form.email.value.trim();
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const emailError = document.getElementById('emailError');

    if (!emailPattern.test(email)) {
      emailError.style.display = 'block';
      valid = false;
    } else {
      emailError.style.display = 'none';
    }

    const phone = form.phone.value.trim();
    const phoneError = document.getElementById('phoneError');

    if (!/^\d{10}$/.test(phone)) {
      phoneError.style.display = 'block';
      valid = false;
    } else {
      phoneError.style.display = 'none';
    }

    const password = form.password.value.trim();
    const confirmPassword = form.confirm_password.value.trim();
    const passwordError = document.getElementById('passwordError');
    const confirmPasswordError = document.getElementById('confirmPasswordError');

    if (password.length < 6) {
      passwordError.style.display = 'block';
      valid = false;
    } else {
      passwordError.style.display = 'none';
    }

    if (password !== confirmPassword) {
      confirmPasswordError.style.display = 'block';
      valid = false;
    } else {
      confirmPasswordError.style.display = 'none';
    }

    if (!valid) e.preventDefault();
  });
</script>

</body>
</html>
